app = "pop-quiz"
primary_region = "ams"

[build]
  [build.args]
    NODE_VERSION = "20"
    PHP_VERSION = "8.4"

[env]
  APP_ENV = "production"
  LOG_CHANNEL = "stderr"
  LOG_LEVEL = "info"
  LOG_STACK = "single"
  SESSION_DRIVER = "cookie"
  CACHE_STORE = "file"
  DB_CONNECTION = "sqlite"
  DB_DATABASE = "/var/www/html/storage/data/database.sqlite"

[[mounts]]
  source = "data"
  destination = "/var/www/html/storage/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpus = 1
